[pr_reviewer]
extra_instructions = """
用中文 code review。除了 org 级通用规则,本仓库特有规则:
- useThemedStyles(maker) 的 maker 必须在 styles.ts 模块顶层 export,
  写在组件内 inline 会打穿 useMemo([colors, shadow, maker]) 缓存
- 颜色 token 是 role-based,亮暗 alpha 差异是有意的(colors.ts 注释解释),
  不要"归一化"
- 暗色 shadow 大多置零(走 surface 5 层亮度阶梯),例外项有明确注释
- r() 走 PixelRatio.roundToNearestPixel(尺寸缩放),rf() moderate 0.3(字号),
  fixed.* 物理常量不缩放
- icons/data.ts 自动生成,不要手改;新 icon 走 scripts/build-icons.js
- ButtonBase 用 render-prop children 共享 chrome,新按钮组件不要重复 Pressable/sizing
- ui/ 原子无业务上下文;business/ 通用复合组件,navigation/store 耦合留在消费者仓库
- 必须 conventional commits 前缀(feat / fix / chore / docs / test / refactor / ci)
"""

[pr_code_suggestions]
extra_instructions = "用中文,引用具体行号,给可落地的代码改进(不要给"考虑重构"这种空泛建议)。"

[pr_description]
extra_instructions = "用中文,1-2 句概括 + 列变更点。如果有 BREAKING CHANGE 必须在 body 显式标注。"
