version: 2
updates:
  # npm 依赖周更 —— 分组减少 PR 噪音
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      types:
        patterns:
          - '@types/*'
      react-native:
        patterns:
          - 'react-native'
          - 'react-native-*'
          - '@react-native/*'
          - '@react-native-community/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - '@eslint-*'
      jest:
        patterns:
          - 'jest'
          - 'jest-*'
          - '@jest/*'
      commitlint:
        patterns:
          - 'commitlint'
          - '@commitlint/*'
      release-it:
        patterns:
          - 'release-it'
          - '@release-it/*'

  # GitHub Actions 月更 —— 升级频率低,month 即可
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
