# 目标路径:.github/workflows/ci.yml
# 由 unif-design/.github 的 templates/ 同步而来 —— 各仓统一版本,不要单仓 drift。
# 改 CI 标准请改 .github/templates/workflows/ci.yml 再 sync-repo.sh 下发,不要直接改本文件。
#
# 这是「四仓最优并集」:
#   - actionlint 显式 -shellcheck=shellcheck 加固(camera 写法)
#   - changes paths-filter job(dorny/paths-filter v4)跳过纯文档/无关 PR
#   - build-android distribution: temurin(design,避 zulu/Azul CDN 偶发 520)
#   - build-ios macos-26 + Xcode 26.5 + RCT_USE_PREBUILT_RNCORE(umeng/hms-scan)
#   - setup-xcode pin v1.6.0 + macos-26(umeng/hms-scan 真实在跑的组合)
name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read    # CI 只读代码;无任何写需求,最小权限

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run actionlint
        # 下载 pinned binary 校验所有 workflow 的 YAML / 表达式 / run 里的 shell。
        # release.yml 那次 YAML 引号 bug 当初就是缺这道 lint 才漏到 main 的。
        # ubuntu-latest 预装 shellcheck;actionlint 默认自动集成它检查 run: 脚本(SC2086 等)。
        # 显式断言 shellcheck 存在 + 传 -shellcheck=shellcheck,防 runner 未来变更导致 shell 检查静默降级。
        run: |
          ACTIONLINT_VERSION=1.7.12
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" | tar -xz actionlint
          shellcheck --version
          ./actionlint -color -shellcheck=shellcheck
        shell: bash

  changes:
    runs-on: ubuntu-latest
    outputs:
      js: ${{ steps.filter.outputs.js }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      shared: ${{ steps.filter.outputs.shared }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Filter changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # 各区域 glob;code = 非纯文档聚合,给 lint/test 用。
          # 注意:不要给本 workflow 加 on.paths —— 那会让 required check 永远 pending 卡死 PR。
          filters: |
            shared:
              - 'package.json'
              - 'yarn.lock'
              - 'tsconfig*.json'
              - 'babel.config.js'
              - 'react-native.config.js'
              - '.nvmrc'
              - '.github/actions/**'        # 复合 setup action,影响所有 build
              - '.github/workflows/ci.yml'  # CI 自身改动才重验(改 release/dependabot/模板/deploy-docs 不触发 build)
            js:
              - 'src/**'
            android:
              - 'android/**'
            ios:
              - 'ios/**'
              - '*.podspec'
            # code = 非纯文档聚合(lint/test 用)。显式列全,不用 YAML anchor ——
            # anchor 在标准 YAML 里展开成 nested array,得靠 dorny 内部 flatten 才生效;
            # 这是安全关键 gate(失效会让 lint/test 永远 skip、误放行坏代码),不赌该行为。
            code:
              - 'package.json'
              - 'yarn.lock'
              - 'tsconfig*.json'
              - 'babel.config.js'
              - 'react-native.config.js'
              - '.nvmrc'
              - '.github/actions/**'        # 复合 setup action,影响所有 build
              - '.github/workflows/ci.yml'  # CI 自身改动才重验(改 release/dependabot/模板/deploy-docs 不触发 build)
              - 'src/**'
              - 'android/**'
              - 'ios/**'
              - '*.podspec'

  lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn typecheck

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests
        run: yarn test --maxWorkers=2 --coverage

  build-library:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.js == 'true' || needs.changes.outputs.shared == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build package
        run: yarn prepare

  build-android:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.android == 'true' || needs.changes.outputs.js == 'true' || needs.changes.outputs.shared == 'true'

    env:
      TURBO_CACHE_DIR: .turbo/android

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache turborepo for Android
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android-

      - name: Check turborepo cache for Android
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:android --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json)).tasks.find(t => t.task === 'build:android').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> "$GITHUB_ENV"
          fi

      - name: Install JDK
        if: env.turbo_cache_hit != 1
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          # temurin:ubuntu runner toolcache 预装 JDK 17,setup-java 本地命中、
          # 不走远端下载,避开 zulu(Azul CDN)偶发 520(error code: 520)。
          distribution: 'temurin'
          java-version: '17'

      - name: Finalize Android SDK
        if: env.turbo_cache_hit != 1
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Cache Gradle
        if: env.turbo_cache_hit != 1
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: |
          yarn turbo run build:android --cache-dir="${{ env.TURBO_CACHE_DIR }}"

  build-ios:
    runs-on: macos-26
    needs: changes
    if: needs.changes.outputs.ios == 'true' || needs.changes.outputs.js == 'true' || needs.changes.outputs.shared == 'true'

    env:
      # macos-26 runner(2026-02-26 GA)装了 Xcode 26.5;26.5 修好了 26.3 上
      # ReactCodegen .cpp 报 'memory' file not found 的 stdlib include path 问题
      # (本地 Xcode 26.5 验证过 prebuilt 能过)。换 macos-26 + 显式 pin 26.5
      # (镜像默认 26.4.1,未验证不用),按官方模板默认开 prebuilt 走预编译
      # React.xcframework,省掉源码编译的 5-10 分钟。Podfile 用官方原版即可,
      # 26.5 上不再需要 #56862 umbrella/modulemap patch。
      # TODO: 待 GitHub 把 macos-latest 滚到 26,可改回 macos-latest +
      # XCODE_VERSION 26,与 create-react-native-library 模板完全一致。
      XCODE_VERSION: "26.5"
      TURBO_CACHE_DIR: .turbo/ios
      RCT_USE_RN_DEP: 1
      RCT_USE_PREBUILT_RNCORE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache turborepo for iOS
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-ios-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-ios-

      - name: Check turborepo cache for iOS
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json)).tasks.find(t => t.task === 'build:ios').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> "$GITHUB_ENV"
          fi

      - name: Use appropriate Xcode version
        if: env.turbo_cache_hit != 1
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install cocoapods
        if: env.turbo_cache_hit != 1
        run: |
          cd example
          bundle install
          bundle exec pod repo update --verbose
          bundle exec pod install --project-directory=ios

      - name: Build example for iOS
        run: |
          yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}"
